apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: syntha-api
  labels:
    app.kubernetes.io/name: syntha-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: syntha-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: browser-worker
  labels:
    app.kubernetes.io/name: browser-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: browser-worker
  minReplicas: 2
  maxReplicas: 25
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: syntha-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: syntha-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: browser-worker
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: browser-worker
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: syntha-dashboard
  labels:
    app.kubernetes.io/name: syntha-dashboard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: syntha-dashboard
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: syntha-dashboard
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: syntha-dashboard
