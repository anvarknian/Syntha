apiVersion: apps/v1
kind: Deployment
metadata:
  name: syntha-dashboard
  labels:
    app.kubernetes.io/name: syntha-dashboard
    app.kubernetes.io/component: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: syntha-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: syntha-dashboard
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: syntha/dashboard:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: syntha-config
          env:
            - name: PORT
              value: "3000"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: syntha-dashboard
  labels:
    app.kubernetes.io/name: syntha-dashboard
spec:
  selector:
    app.kubernetes.io/name: syntha-dashboard
  ports:
    - name: http
      port: 3000
      targetPort: http
