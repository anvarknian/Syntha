apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-worker
  labels:
    app.kubernetes.io/name: browser-worker
    app.kubernetes.io/component: browser-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: browser-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: browser-worker
        app.kubernetes.io/component: browser-worker
    spec:
      containers:
        - name: browser-worker
          image: syntha/browser-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: syntha-config
          env:
            - name: PLAYWRIGHT_TARGET_URL
              value: about:blank
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
