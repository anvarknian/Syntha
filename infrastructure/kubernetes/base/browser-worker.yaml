apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-worker
  labels:
    app.kubernetes.io/name: browser-worker
    app.kubernetes.io/component: browser-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: browser-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: browser-worker
        app.kubernetes.io/component: browser-worker
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: browser-worker
          image: syntha/browser-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: syntha-config
          env:
            - name: PLAYWRIGHT_TARGET_URL
              value: about:blank
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
