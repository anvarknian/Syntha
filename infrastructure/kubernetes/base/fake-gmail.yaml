apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-gmail
  labels:
    app.kubernetes.io/name: fake-gmail
    app.kubernetes.io/component: fake-saas
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fake-gmail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fake-gmail
        app.kubernetes.io/component: fake-saas
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fake-gmail
          image: syntha/fake-gmail:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: syntha-config
          env:
            - name: EXPORT_DENY_FIELDS
              value: body
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          ports:
            - name: http
              containerPort: 3001
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: fake-gmail
  labels:
    app.kubernetes.io/name: fake-gmail
spec:
  selector:
    app.kubernetes.io/name: fake-gmail
  ports:
    - name: http
      port: 3001
      targetPort: http
