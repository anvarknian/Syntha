apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-schema
  labels:
    app.kubernetes.io/name: clickhouse
data:
  schema.sql: |
    CREATE DATABASE IF NOT EXISTS syntha;

    CREATE TABLE IF NOT EXISTS syntha.events
    (
      timestamp DateTime64(3, 'UTC'),
      run_id String,
      event_id String,
      sequence UInt64,
      kind LowCardinality(String),
      seed Int64,
      checksum FixedString(64),
      payload_json String,
      metadata_json String
    )
    ENGINE = MergeTree
    PARTITION BY toYYYYMM(timestamp)
    ORDER BY (run_id, sequence, timestamp);

    CREATE TABLE IF NOT EXISTS syntha.replay_runs
    (
      started_at DateTime64(3, 'UTC'),
      run_id String,
      replay_file String,
      replayed UInt64,
      failed UInt64
    )
    ENGINE = MergeTree
    PARTITION BY toYYYYMM(started_at)
    ORDER BY (run_id, started_at);
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: analytics
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/component: analytics
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.12
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-schema
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: clickhouse-schema
          configMap:
            name: clickhouse-schema
  volumeClaimTemplates:
    - metadata:
        name: clickhouse-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  labels:
    app.kubernetes.io/name: clickhouse
spec:
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
