apiVersion: apps/v1
kind: Deployment
metadata:
  name: syntha-orchestrator
  labels:
    app.kubernetes.io/name: syntha-orchestrator
    app.kubernetes.io/component: orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: syntha-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: syntha-orchestrator
        app.kubernetes.io/component: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: syntha/orchestrator:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: syntha-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
